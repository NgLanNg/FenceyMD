# Test the app on every push / PR. Build the desktop bundle in a
# matrix so we know macOS, Windows, and Linux all keep working —
# Tauri is sensitive to platform-specific Rust + native deps.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref —
# pushes to a PR while CI is running should restart, not queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. JS + Rust unit tests on the host platform ──────────────────────
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Linux runners need the webkit2gtk deps for tauri build.
          # macOS / Windows runners have their native deps via
          # `tauri-apps/tauri-action`'s deps install step.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: npm ci

      - name: Build (vite)
        run: npm run build

      - name: Cargo test
        run: cd src-tauri && cargo test --all-features

      # e2e is browser-driven and the bundled .app is what ships, so
      # we run the JS-side e2e (puppeteer + Chrome) on the host. The
      # desktop build is exercised by the `bundle` job below.
      - name: Install Chrome (e2e)
        if: matrix.os != 'windows-latest'
        run: |
          if [ ! -d "/Applications/Google Chrome.app" ] && [ ! -f "/usr/bin/google-chrome" ]; then
            echo "Chrome not preinstalled; skipping e2e on ${{ matrix.os }}"
            exit 0
          fi

      - name: e2e (puppeteer)
        run: |
          if (ls /Applications/Google\ Chrome.app >/dev/null 2>&1 || [ -f /usr/bin/google-chrome ]) || command -v google-chrome >/dev/null; then
            node e2e-test.mjs
          else
            echo "::warning::Chrome not found, skipping e2e on ${{ matrix.os }}"
          fi
        shell: bash

  # ── 2. Desktop bundle build, matrix per platform ─────────────────────
  # Verifies the Tauri build chain end-to-end on each platform.
  # Not gated on PR (slow + needs platform-specific runners), so we
  # run on push to main and on tag.
  bundle:
    name: bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target aarch64-apple-darwin --target x86_64-apple-darwin"
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: npm ci

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Fenceymd {0}', github.ref_name) || '' }}
          releaseBody: |
            See [CHANGELOG](./CHANGELOG.md) for what changed.
            See [THIRD-PARTY-LICENSES](./THIRD-PARTY-LICENSES.md) for attributions.
          releaseDraft: true
          args: ${{ matrix.args }}

  # ── 3. License drift check on deps changes ───────────────────────────
  # If package.json or Cargo.toml changes, regenerate the
  # THIRD-PARTY-LICENSES files and fail the PR if the committed
  # copy is out of date. Keeps the attribution file honest.
  licenses:
    name: licenses up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install JS deps
        run: npm ci
      - name: Regenerate licenses
        run: node scripts/gen-licenses.mjs
      - name: Check drift
        run: |
          if ! git diff --quiet THIRD-PARTY-LICENSES.md THIRD-PARTY-LICENSES.csv; then
            echo "::error::THIRD-PARTY-LICENSES files are out of date. Run \`node scripts/gen-licenses.mjs\` and commit the result."
            git diff --stat THIRD-PARTY-LICENSES.md THIRD-PARTY-LICENSES.csv
            exit 1
          fi
