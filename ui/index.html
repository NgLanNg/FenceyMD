  <style>
    .picker-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
      background: var(--surface);
    }
    .picker-screen h1 {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
    }
    .picker-screen p {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--ink-secondary);
      max-width: 480px;
      line-height: 1.6;
    }
    .picker-btn {
      padding: 0.75rem 2rem;
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .picker-btn:hover { opacity: 0.8; }
    .picker-hint {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-muted);
    }
    .picker-error {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--tertiary);
      background: var(--tertiary-dim);
      padding: 0.6rem 1rem;
      border-radius: var(--radius-md);
      display: none;
    }
    .folder-name-tag {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      background: var(--surface-variant);
      padding: 2px 8px;
      border-radius: 999px;
    }
    pre.mermaid, pre:has(code.language-mermaid) {
      background: var(--surface-container-lowest);
      display: flex;
      justify-content: center;
    }
    pre.mermaid svg, pre:has(code.language-mermaid) svg { max-width: 100%; height: auto; }
    pre.svg-block {
      background: var(--surface-container-lowest);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    pre.svg-block svg { max-width: 100%; height: auto; }

    .group-card {
      background: var(--surface-container-lowest);
      border-radius: var(--radius-md);
      padding: var(--space-6) var(--space-8);
      cursor: pointer;
      transition: background 0.2s;
    }
    .group-card:hover { background: var(--surface-variant); }
    .group-card-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: var(--space-2);
    }
    .group-card-meta {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-muted);
    }

    /* Full CSS */
    :root {
      --surface: #faf9f8;
      --surface-variant: #dfe3e2;
      --surface-container-low: #f3f4f3;
      --surface-container-lowest: #f0f1f0;
      --ink: #2f3333;
      --ink-secondary: #5c5f5f;
      --ink-muted: #767878;
      --tertiary: #a33e34;
      --tertiary-dim: rgba(163, 62, 52, 0.08);
      --font-serif: 'Newsreader', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --content-w: 680px;
      --home-w: 980px;
      --landing-w: 820px;
      --radius-sm: 2px;
      --radius-md: 4px;
      --radius-lg: 8px;
      --dark-surface: #1a1a1c;
      --dark-surface-variant: #2e2e30;
      --dark-surface-container-low: #222224;
      --dark-surface-container-lowest: #1c1c1e;
      --dark-ink: #e8e8e6;
      --dark-ink-secondary: #a8a8a6;
      --dark-ink-muted: #7a7a78;
      --dark-primary: #c0c0be;
    }
    [data-theme="dark"] {
      --surface: var(--dark-surface);
      --surface-variant: var(--dark-surface-variant);
      --surface-container-low: var(--dark-surface-container-low);
      --surface-container-lowest: var(--dark-surface-container-lowest);
      --ink: var(--dark-ink);
      --ink-secondary: var(--dark-ink-secondary);
      --ink-muted: var(--dark-ink-muted);
      --tertiary: #e06c5a;
      --tertiary-dim: rgba(224, 108, 90, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    html[data-font-size="sm"] .chapter-markdown { font-size: 0.875rem; }
    html[data-font-size="lg"] .chapter-markdown { font-size: 1.125rem; }
    html[data-font-size="xl"] .chapter-markdown { font-size: 1.25rem; }
    body {
      font-family: var(--font-serif);
      background: var(--surface);
      color: var(--ink);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .app-shell { display: flex; min-height: 100vh; }
    .main-content { flex: 1; overflow: hidden; display: flex; align-items: flex-start; min-width: 0; }
    .nav-back-link {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: color 0.15s, background 0.15s;
      margin-bottom: var(--space-2);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
    }
    .nav-back-link:hover { color: var(--ink-secondary); background: var(--surface-variant); }
    .sibling-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      margin: var(--space-4) 0;
      background: var(--surface-container-low);
      border-radius: var(--radius-lg);
      font-family: var(--font-sans);
      font-size: 13px;
      border: 1px solid var(--surface-variant);
    }
    .sibling-nav-bottom {
      margin-top: var(--space-8);
      padding-top: var(--space-6);
      border-top: 1px solid var(--surface-variant);
    }
    .sibling-nav-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--surface);
      border: 1px solid var(--surface-variant);
      color: var(--ink);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: all 0.15s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sibling-nav-btn:hover { background: var(--ink); color: var(--surface); border-color: var(--ink); }
    .sibling-nav-btn.prev { flex-direction: row; }
    .sibling-nav-btn.next { flex-direction: row-reverse; }
    .sibling-nav-center {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-shrink: 0;
    }
    .sibling-nav-label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--ink-secondary);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: all 0.15s;
    }
    .sibling-nav-label:hover { background: var(--surface-variant); color: var(--ink); }
    .sibling-nav-label svg { width: 14px; height: 14px; }
    .sibling-nav-counter {
      color: var(--ink-muted);
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-variant);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .sibling-nav-placeholder {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 120px;
      color: var(--surface-variant);
    }
    .sibling-nav-placeholder span { color: var(--surface-variant); }
    .sibling-nav-placeholder svg { width: 16px; height: 16px; opacity: 0.4; }
    .nav-section-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: var(--space-6) var(--space-4) var(--space-2);
    }
    .nav-chapter-link {
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-family: var(--font-serif);
      font-size: 13.5px;
      color: var(--ink-secondary);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      line-height: 1.5;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }
    .nav-chapter-link:hover { color: var(--ink); background: var(--surface-variant); }
    .nav-chapter-link.active { color: var(--ink); font-weight: 500; background: var(--surface-variant); border-left-color: var(--tertiary); }
.main-content { flex: 1; overflow: visible; display: flex; align-items: flex-start; justify-content: center; min-width: 0; }
    .content-area {
      flex: 0 0 auto;
      width: 100%;
      overflow-y: visible;
      animation: fade-in 0.25s ease;
      max-width: var(--content-w, 680px);
      margin: 0 auto;
      padding: var(--space-16) var(--space-12);
      box-sizing: border-box;
    }
    .content-area-wrapper {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      min-width: 0;
      height: 100vh;
      box-sizing: border-box;
    }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .home-container { max-width: var(--home-w); margin: 0 auto; padding: var(--space-16) 0 var(--space-12); }
    .home-header {
      padding: var(--space-10) var(--space-12) var(--space-8);
      border-bottom: 1px solid var(--surface-variant);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .home-header-title {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .home-header-sub {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
    }
    .home-title {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: var(--space-3);
      color: var(--ink);
    }
    .home-subtitle {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--ink-secondary);
      line-height: 1.6;
      margin-bottom: var(--space-12);
      max-width: 560px;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: var(--space-6);
    }
    .book-landing { max-width: var(--landing-w); margin: 0 auto; padding: var(--space-12) 0 var(--space-16); }
    .book-landing-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-6);
      margin-bottom: var(--space-10);
      padding-bottom: var(--space-10);
      border-bottom: 1px solid var(--surface-variant);
    }
    .book-landing-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .book-landing-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: var(--space-3);
    }
    .book-landing-meta {
      display: flex;
      gap: var(--space-5);
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
    }
    .book-landing-meta strong { color: var(--ink-secondary); font-weight: 500; }
    .chapter-list { display: flex; flex-direction: column; }
    .chapter-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--surface-variant);
      font-family: var(--font-serif);
      font-size: 14px;
    }
    .chapter-item:first-child { border-top: 1px solid var(--surface-variant); }
    .chapter-item.clickable { cursor: pointer; transition: background 0.15s; }
    .chapter-item.clickable:hover { background: var(--surface-container-lowest); }
    .chapter-num {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      min-width: 36px;
      flex-shrink: 0;
    }
    .chapter-item-title {
      flex: 1;
      font-size: 14.5px;
      color: var(--ink);
      line-height: 1.5;
    }
    .chapter-item-arrow {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--ink-muted);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      transform: translateX(-4px);
    }
    .chapter-item.clickable:hover .chapter-item-arrow { opacity: 1; transform: translateX(0); }
    .chapter-viewer { max-width: var(--content-w, 680px); margin: 0 auto; padding: var(--space-12) var(--space-8) var(--space-16); }

    .folder-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-secondary);
      border-radius: var(--radius-md);
      transition: background 0.15s;
      user-select: none;
    }
    .folder-item:hover { background: var(--surface-container-lowest); color: var(--ink); }
    .folder-item-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s;
      color: var(--ink-muted);
      font-size: 10px;
    }
    .folder-item.expanded .folder-item-arrow { transform: rotate(90deg); }
    .folder-item-icon { font-size: 14px; }
    .folder-item-name { font-weight: 500; }
    .folder-children { padding-left: var(--space-6); }
    .folder-children.collapsed { display: none; }
    .reader-tools {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) 0;
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--surface-variant);
      flex-wrap: wrap;
    }
    .reader-tools-left { display: flex; align-items: center; gap: var(--space-1); flex: 1; }
    .reader-tools-right { display: flex; align-items: center; gap: var(--space-1); }
    .tool-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--surface-variant);
      border-radius: var(--radius-md);
      background: var(--surface-container-low);
      color: var(--ink-secondary);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .tool-btn:hover { background: var(--surface-variant); color: var(--ink); border-color: var(--ink-muted); }
    .tool-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .tool-sep { width: 1px; height: 18px; background: var(--surface-variant); margin: 0 var(--space-1); }
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--tertiary);
      z-index: 100;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .code-block-wrapper { position: relative; }
    .code-block-wrapper .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      background: var(--surface-container-low);
      border: 1px solid var(--surface-variant);
      border-radius: var(--radius-sm);
      color: var(--ink-muted);
      font-family: var(--font-sans);
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .code-block-wrapper:hover .copy-btn { opacity: 1; }
    .code-block-wrapper .copy-btn:hover { color: var(--ink); background: var(--surface-variant); }
    .search-highlight { background: #fef08a; border-radius: 2px; padding: 0 1px; }
    [data-theme="dark"] .search-highlight { background: #713f12; }
    .chapter-info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      margin-bottom: var(--space-4);
      border-bottom: 1px solid var(--surface-variant);
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-muted);
    }
    .chapter-info-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chapter-info-words { white-space: nowrap; }
    .next-chapter-container {
      margin-top: var(--space-16);
      padding-top: var(--space-6);
      border-top: 1px solid var(--surface-variant);
    }
    .next-chapter-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      background: var(--ink);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .next-chapter-btn:hover { opacity: 0.8; }
    .chapter-markdown {
      font-family: var(--font-serif);
      font-size: 1rem;
      line-height: 1.8;
      color: var(--ink);
    }
    .chapter-markdown h1 {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: var(--space-6);
    }
    .chapter-markdown h2 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-top: var(--space-10);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--surface-variant);
      color: var(--ink);
    }
    .chapter-markdown h3 {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: var(--space-8);
      margin-bottom: var(--space-3);
      color: var(--ink);
    }
    .chapter-markdown h4 {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: var(--space-6);
      margin-bottom: var(--space-3);
    }
    .chapter-markdown p { margin-bottom: var(--space-5); }
    .chapter-markdown a {
      color: var(--tertiary);
      text-decoration: none;
      border-bottom: 1px solid var(--tertiary-dim);
      transition: border-color 0.15s;
    }
    .chapter-markdown a:hover { border-bottom-color: var(--tertiary); }
    .chapter-markdown code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.82em;
      background: var(--surface-container-lowest);
      color: var(--ink);
      padding: 2px 5px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--surface-variant);
    }
    .chapter-markdown pre {

    .status-badge {

    .chapter-markdown .callout {

    /* ── Recents on picker (additive) ───────────────────────────────────── */
    .recents { width: 100%; max-width: 440px; margin-top: var(--space-2); }

    .sidebar-filter {

      border: 1px solid var(--surface-variant); border-radius: var(--radius-md);

    }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: var(--space-2) var(--space-3) var(--space-4); }

    .sidebar-group-head {

    .sidebar-chapter.active {

    .sidebar-chapter-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .sidebar-chapter .done { color: var(--ink-muted); font-size: 11px; flex-shrink: 0; }
    .sidebar-chapter .bm { color: var(--tertiary); font-size: 11px; flex-shrink: 0; }
    .sidebar-section-label {
      font-family: var(--font-sans); font-size: 10px; font-weight: 600;

    .sidebar-footer {

    /* Floating reopen button when collapsed */

      border: 1px solid var(--surface-variant); background: var(--surface-container-lowest);

    /* recents dropdown under folder name */
    .folder-menu {

      border-radius: var(--radius-md); box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      max-width: 320px; min-width: 220px; padding: var(--space-2); display: none;
    }
    .folder-menu.open { display: block; }
    .folder-menu .recent-item-name { font-size: 12px; }
    .folder-menu-open {
      width: 100%; text-align: left; background: none; border: none; cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--tertiary);
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-md); margin-top: 2px;
      border-top: 1px solid var(--surface-variant);

    /* ── Edit mode (additive) ───────────────────────────────────────────── */
    .editor-wrap { display: flex; flex-direction: column; gap: var(--space-4); }

      display: flex; align-items: center; gap: var(--space-3);

      width: 100%; min-height: 60vh; resize: vertical;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px;
      line-height: 1.6; color: var(--ink); background: var(--surface-container-lowest);
      border: 1px solid var(--surface-variant); border-radius: var(--radius-md);
      padding: var(--space-4); outline: none; tab-size: 2;
    }

    .btn-primary {
      background: var(--ink); color: var(--surface); border: none; cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;

      background: none; color: var(--ink-secondary); border: 1px solid var(--surface-variant);
      cursor: pointer; font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      padding: 6px 16px; border-radius: var(--radius-md);
    }
    .btn-ghost:hover { background: var(--surface-variant); color: var(--ink); }
    .tool-btn.bookmarked { color: var(--tertiary); border-color: var(--tertiary); background: var(--tertiary-dim); }
    .disk-changed-banner {
      display: none; align-items: center; gap: var(--space-3);
      background: var(--tertiary-dim); color: var(--tertiary);
      border: 1px solid var(--tertiary); border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-4); margin-bottom: var(--space-4);
      font-family: var(--font-sans); font-size: 12px;
    }
    .disk-changed-banner button {
      background: var(--tertiary); color: #fff; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-sm);
    }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 40; box-shadow: 0 0 40px rgba(0,0,0,0.25); }
    }
  </style>
</head>
<body>

<!-- PICKER -->
<div id="picker" class="picker-screen">
  <h1>FenceyMD</h1>
  <p>Pick any folder of Markdown files — chapters, notes, docs. Everything loads locally, no server needed.</p>
  <button class="picker-btn" onclick="triggerFolderPicker()">Open Folder</button>
  <p class="picker-hint">Chromium / Chrome only — grants filesystem access to the chosen folder</p>
  <p id="picker-error" class="picker-error"></p>
  <input type="file" id="folder-input" multiple webkitdirectory style="display:none" onchange="onFolderSelected(this.files)" />
  <div id="recents" class="recents" style="display:none"></div>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="app-shell" style="display:none">
  <button class="nav-reopen" id="nav-reopen" onclick="toggleSidebar()" title="Show navigation" aria-label="Show navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="content-area-wrapper" id="content-area-wrapper">
      <div class="content-area" id="content-area">
        <div class="loading-msg">Loading</div>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";

// ── State ─────────────────────────────────────────────────────────────────────
let folderName   = '';
let folderMeta   = [];
let groupMeta    = {};
let currentPath  = null;
let folderRoot   = '';          // absolute path of the open folder (Tauri)
let progressMap  = {};          // diskPath -> { scroll, bookmarked }
let editing      = false;       // true while the editor is open
let diskChangedWhileEditing = null; // pending external content for current file

// ── Tauri bridge + persistence ─────────────────────────────────────────────────
const TAURI = (typeof window !== 'undefined') && window.__TAURI__ && window.__TAURI__.core ? window.__TAURI__ : null;
const invoke = (cmd, args) => TAURI.core.invoke(cmd, args);

// Per-file reading progress. In Tauri it persists to disk via Rust; in a plain
// browser it falls back to localStorage keyed by folder name.
async function loadProgress() {
  if (TAURI) {
    try { progressMap = await invoke('get_progress', { folder: folderRoot }) || {}; }
    catch (e) { progressMap = {}; }
  } else {
    try { progressMap = JSON.parse(localStorage.getItem('md-progress::' + folderName)) || {}; }
    catch (e) { progressMap = {}; }
  }
}
let _saveTimer = null;
function saveProgress(diskPath, scroll, bookmarked) {
  progressMap[diskPath] = { scroll, bookmarked };
  if (TAURI) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => {
      invoke('save_progress', { folder: folderRoot, path: diskPath, scroll, bookmarked }).catch(() => {});
    }, 400);
  } else {
    localStorage.setItem('md-progress::' + folderName, JSON.stringify(progressMap));
  }
}
function progressFor(diskPath) { return progressMap[diskPath] || { scroll: 0, bookmarked: false }; }

// ── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
  initTheme();
  const savedCW = localStorage.getItem('fenceymd-content-width');
  if (savedCW) document.documentElement.style.setProperty('--content-w', savedCW + 'px');
  if (savedCW) adjustContentWidth(0);
  const p = new URL(location.href).searchParams;
  if (p.get('test') === '1') {
    await loadTestData();
    folderRoot = folderName;
    await loadProgress();
    document.getElementById('picker').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    renderSidebar();
    showHome();
    return;
  }

  // Desktop: auto-reopen the last folder, else show the picker with recents.
  if (TAURI) {
    try {
      const last = await invoke('open_last');
      if (last) { openScanResult(last); return; }
    } catch (e) { console.warn('[open_last]', e); }
    renderRecents();
  }
}

// ── Folder picker (showDirectoryPicker) ──────────────────────────────────
function triggerFolderPicker() {
  // Native desktop (Tauri): use the Rust folder picker + scanner.
  if (window.__TAURI__ && window.__TAURI__.core) {
    const errEl = document.getElementById('picker-error');
    errEl.style.display = 'none';
    window.__TAURI__.core.invoke('pick_folder').then(res => {
      if (res) openScanResult(res);
    }).catch(err => {
      console.warn('[Tauri picker]', err);
      errEl.textContent = 'Could not read folder: ' + err;
      errEl.style.display = 'block';
    });
    return;
  }
  if ('showDirectoryPicker' in window) {
    showDirectoryPicker({ mode: 'read' }).then(handleDirectoryHandle).catch(err => {
      if (err.name !== 'AbortError') console.warn('[Picker]', err);
    });
    return;
  }
  document.getElementById('folder-input').click();
}

// ── Build index from native (Tauri) records: {path, name, content} ──────────
// `diskPath` keeps the full path under the root (group prefix intact) so it
// matches the watcher events and write_file/progress keys; `path` stays
// group-stripped to preserve the existing renderer behaviour.
function buildIndexFromRecords(name, records) {
  folderName = name || 'Selected Folder';
  folderMeta = [];
  groupMeta  = {};

  for (const r of records) {
    const parts = r.path.split('/');
    const folderPrefix = parts[0];
    if (folderPrefix.startsWith('.')) continue;
    const isGrouped = parts.length > 1;
    const relativePath = isGrouped ? parts.slice(1).join('/') : r.name;
    const item = { path: relativePath, diskPath: r.path, name: r.name, content: r.content, grouped: isGrouped };
    folderMeta.push(item);
    if (isGrouped) {
      if (!groupMeta[folderPrefix]) groupMeta[folderPrefix] = [];
      groupMeta[folderPrefix].push(item);
    }
  }

  groupMeta = sortGroups(groupMeta);
  for (const g in groupMeta) {
    const hasCh = groupMeta[g].some(i => /ch\.?(\d+)/i.test(i.name));
    groupMeta[g].sort((a, b) => hasCh ? numFromName(a.name) - numFromName(b.name) : a.name.localeCompare(b.name));
  }
}

// Open a Rust ScanResult: build index, load progress, reveal shell, start watch.
async function openScanResult(scan) {
  folderRoot = scan.root || scan.folder_name;
  buildIndexFromRecords(scan.folder_name, scan.files);
  await loadProgress();
  document.getElementById('picker').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  renderSidebar();
  showHome();
  if (TAURI) {
    invoke('watch_folder', { path: folderRoot }).catch(e => console.warn('[watch]', e));
  }
}

// ── Recents (picker screen) ─────────────────────────────────────────────────
async function renderRecents() {
  const box = document.getElementById('recents');
  if (!TAURI) { box.style.display = 'none'; return; }
  let recents = [];
  try { recents = await invoke('get_recents') || []; } catch (e) { recents = []; }
  if (!recents.length) { box.style.display = 'none'; return; }
  box.innerHTML = '<div class="recents-label">Recent</div>' + recents.map(r => `
    <div class="recent-item ${r.exists ? '' : 'missing'}" ${r.exists ? `onclick="openRecent('${escAttr(r.path)}')"` : ''}>
      <span style="flex-shrink:0">📁</span>
      <span class="recent-item-name">${escHtml(r.name)}${r.exists ? '' : ' <span style="color:var(--ink-muted)">(missing)</span>'}</span>
      <span class="recent-item-path">${escHtml(r.path)}</span>
      <button class="recent-item-x" title="Remove" onclick="event.stopPropagation();removeRecent('${escAttr(r.path)}')">✕</button>
    </div>`).join('');
  box.style.display = 'block';
}
async function openRecent(path) {
  try {
    const scan = await invoke('open_folder_path', { path });
    if (scan) openScanResult(scan);
    else { const e = document.getElementById('picker-error'); e.textContent = 'Folder no longer exists.'; e.style.display = 'block'; renderRecents(); }
  } catch (e) { console.warn('[openRecent]', e); }
}
async function removeRecent(path) {
  try { await invoke('remove_recent', { path }); } catch (e) {}
  renderRecents();
}

// ── Left nav sidebar ────────────────────────────────────────────────────────
function chapterStatus(item) {
  const pr = progressFor(item.diskPath || item.path);
  return { done: pr.scroll >= 0.95, bookmarked: !!pr.bookmarked };
}
function renderSidebar() {
  const el = document.getElementById('sidebar');
  if (!el) return;
  const groups = Object.keys(groupMeta);
  const ungrouped = folderMeta.filter(f => !f.grouped);
  const bookmarks = folderMeta.filter(f => chapterStatus(f).bookmarked);

  const chapterRow = (item) => {
    const st = chapterStatus(item);
    const active = item.path === currentPath ? ' active' : '';
    const mark = st.bookmarked ? '<span class="bm">★</span>' : (st.done ? '<span class="done">✓</span>' : '');
    return `<button class="sidebar-chapter${active}" data-path="${escAttr(item.path)}"
      onclick="loadChapter('${escAttr(item.path)}')" title="${escAttr(labelFromName(item.name))}">
      <span class="sidebar-chapter-title">${escHtml(labelFromName(item.name))}</span>${mark}</button>`;
  };

  let html = `
    <div class="sidebar-header">
      <button class="sidebar-folder" onclick="toggleFolderMenu(event)" title="Switch folder">

// ── Build from DirectoryHandle ───────────────────────────────────────────────
async function handleDirectoryHandle(dirHandle) {
  folderName = dirHandle.name;
  folderMeta = [];
  groupMeta  = {};

  async function scanDir(handle, currentPath) {
    for await (const [name, entry] of handle.entries()) {
      if (entry.kind === 'directory') {
        if (name.startsWith('.')) continue;
        await scanDir(entry, currentPath ? currentPath + '/' + name : name);
      } else if (entry.kind === 'file' && name.endsWith('.md')) {
        const rel = currentPath ? currentPath + '/' + name : name;
        const file = await entry.getFile();
        folderMeta.push({ path: rel, name, file });
      }
    }
  }

  await scanDir(dirHandle, '');

  for (const f of folderMeta) {
    const parts = f.path.split('/');
    const group = parts[0];
    if (group.startsWith('.')) continue;
    const isGrouped = parts.length > 1;
    f.grouped = isGrouped;
    if (!groupMeta[group]) groupMeta[group] = [];
    groupMeta[group].push(f);
  }

  groupMeta = sortGroups(groupMeta);
  for (const g in groupMeta) {
    const hasCh = groupMeta[g].some(i => /ch\.?(\d+)/i.test(i.name));
    groupMeta[g].sort((a, b) => hasCh ? numFromName(a.name) - numFromName(b.name) : a.name.localeCompare(b.name));
  }

  folderRoot = folderName;
  await loadProgress();
  document.getElementById('picker').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  renderSidebar();
  showHome();
}

// ── Build index from FileList (webkitdirectory) ──────────────────────────
function buildIndex(fileList) {
  folderMeta = [];
  groupMeta  = {};

  for (const file of fileList) {
    if (!file.name.endsWith('.md')) continue;

    const rel = file.webkitRelativePath || file.name;
    const parts = rel.split('/');
    const folderPrefix = parts[0];
    if (folderPrefix.startsWith('.')) continue;

    const isGrouped = parts.length > 1;
    const relativePath = isGrouped ? parts.slice(1).join('/') : file.name;
    const item = { path: relativePath, name: file.name, file, grouped: isGrouped };
    folderMeta.push(item);

    if (isGrouped) {
      const g = parts[0];
      if (!groupMeta[g]) groupMeta[g] = [];
      groupMeta[g].push(item);
    }
  }

  groupMeta = sortGroups(groupMeta);
  for (const g in groupMeta) {
    const hasCh = groupMeta[g].some(i => /ch\.?(\d+)/i.test(i.name));
    groupMeta[g].sort((a, b) => hasCh ? numFromName(a.name) - numFromName(b.name) : a.name.localeCompare(b.name));
  }
}

// ── Sort groups numerically (part-i → part-ii → ... → part-ix) ──────────
function sortGroups(gm) {
  const sorted = {};
  Object.keys(gm).sort((a, b) => {
    const na = parseInt(a.replace(/[^0-9]/g, '')) || 0;
    const nb = parseInt(b.replace(/[^0-9]/g, '')) || 0;
    return na - nb;
  }).forEach(k => { sorted[k] = gm[k]; });
  return sorted;
}

// ── Folder tree helpers ─────────────────────────────────────────────────────
let expandedFolders = new Set();

function buildFolderTree(items) {
  const root = { name: '', children: {} };

  for (const item of items) {
    const parts = item.path.split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      const part = parts[i];
      if (!node.children[part]) {
        node.children[part] = { name: part, folderPath: parts.slice(0, i + 1).join('/'), children: {} };
      }
      node = node.children[part];
    }
    const fileName = parts[parts.length - 1];
    node.children[fileName] = { name: fileName, path: item.path, item };
  }

  function treeToArray(node, parentPath) {
    const folders = [];
    const files = [];

    for (const [name, child] of Object.entries(node.children)) {
      if (child.path) {
        files.push(child);
      } else {
        folders.push(child);
      }
    }

    folders.sort((a, b) => a.name.localeCompare(b.name));
    files.sort((a, b) => {
      const aNum = numFromName(a.name);
      const bNum = numFromName(b.name);
      if (aNum !== bNum) return aNum - bNum;
      return a.name.localeCompare(b.name);
    });

    const result = [...folders, ...files];
    for (const child of result) {
      if (!child.path) {
        child._childrenArray = treeToArray(child, child.folderPath);
      }
    }
    return result;
  }

  return treeToArray(root, '');
}

function renderFolderTree(nodes, depth = 0) {
  let html = '';
  for (const node of nodes) {
    if (node.path) {
      const num = numFromName(node.name);
      html += `
        <div class="chapter-item clickable" data-path="${escAttr(node.path)}" style="padding-left: ${depth * 20}px">
          <span class="chapter-num">${num < 999 ? num : ''}</span>
          <span class="chapter-item-title">${escHtml(shortTitle(node.name))}</span>
          <span class="chapter-item-arrow">→</span>
        </div>`;
    } else {
      const folderId = 'folder-' + btoa(node.folderPath).replace(/=/g, '').replace(/\+/g, '-');
      const isExpanded = expandedFolders.has(node.folderPath);
      html += `
        <div class="folder-item ${isExpanded ? 'expanded' : ''}" data-folder="${escAttr(node.folderPath)}" data-folder-id="${folderId}">
          <span class="folder-item-arrow">▶</span>
          <span class="folder-item-icon">📁</span>
          <span class="folder-item-name">${escHtml(labelFromName(node.name))}</span>
        </div>
        <div class="folder-children ${isExpanded ? '' : 'collapsed'}" id="${folderId}">
          ${renderFolderTree(node._childrenArray || [], depth + 1)}
        </div>`;
    }
  }
  return html;
}

function toggleFolder(folderPath) {
  if (expandedFolders.has(folderPath)) {
    expandedFolders.delete(folderPath);
  } else {
    expandedFolders.add(folderPath);
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function numFromName(name) {
  const m = name.match(/ch\.?(\d+)|(\d+)\./);
  return m ? parseInt(m[1] || m[2], 10) : 999;
}

function labelFromName(name) {
  return name.replace(/\.md$/i, '')
    .replace(/^ch\.?\d+[-_. ]*/i, '')  // strip ch01- / ch01_ prefix
    .replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function shortTitle(name) {
  // Just the chapter number + short title, for chapter list
  const num = numFromName(name);
  const label = labelFromName(name);
  return num < 999 ? `${num}. ${label}` : label;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/'/g, '&#39;');
}

// ── CHAPTER VIEWER ───────────────────────────────────────────────────────────
async function loadChapter(path, opts = {}) {
  editing = false;
  currentPath = path;
  setSidebarActive(path);
  const area = document.getElementById('content-area');
  area.innerHTML = `<div class="chapter-viewer"><div class="loading-msg">Loading</div></div>`;

  const item = folderMeta.find(f => f.path === path);
  if (!item) {
    area.innerHTML = `<div class="chapter-viewer"><p style="color:var(--tertiary)">File not found: ${escHtml(path)}</p></div>`;
    return;
  }

  try {
    let text;
    if (item.file) {
      text = await item.file.text();
    } else if (item.content != null) {
      text = item.content;
    } else {
      text = `# ${labelFromName(path)}\n\n> *Content not available in test mode.*\n\nPath: \`${escHtml(path)}\``;
    }
    renderChapter(text, path);
    // Restore reading position, or honour an explicit keep-scroll (live reload).
    if (opts.keepScroll != null) {
      window.scrollTo(0, opts.keepScroll);
    } else {
      const pr = progressFor(item.diskPath || item.path);
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollTo(0, pr.scroll > 0 && docH > 0 ? Math.round(pr.scroll * docH) : 0);
    }
  } catch (err) {
    area.innerHTML = `<div class="chapter-viewer"><p style="color:var(--tertiary)">Error: ${err.message}</p></div>`;
  }
}

// ── MARKDOWN RENDERER ───────────────────────────────────────────────────────
const converter = new showdown.Converter({
  tables: true, tasklists: true, strikethrough: true,
  simplifiedAutoLink: true, openLinksInNewWindow: true,
  ghCodeBlocks: true,
});

function renderChapter(text, path) {
  const area = document.getElementById('content-area');
  const _item = folderMeta.find(f => f.path === path);
  const _bmActive = _item ? chapterStatus(_item).bookmarked : false;
  const pathParts = path.split('/');
  const group = pathParts.length > 1 ? pathParts[0] : null;
  const label = labelFromName(pathParts[pathParts.length - 1]);
  const backLabel = group || folderName;
  const backOnclick = group ? `showGroup('${escAttr(group)}')` : 'showHome()';
  const wordCount = text.trim().split(/\s+/).length;

  const mdTitleMatch = text.match(/^#\s+(.+)$/m);
  const mdTitle = mdTitleMatch ? mdTitleMatch[1].trim() : label;

  const groupItems = group ? (groupMeta[group] || []) : folderMeta;
  const currentIdx = groupItems.findIndex(f => f.path === path);
  const prevItem = currentIdx > 0 ? groupItems[currentIdx - 1] : null;
  const nextItem = currentIdx >= 0 && currentIdx < groupItems.length - 1 ? groupItems[currentIdx + 1] : null;

  const siblingNavTop = (prevItem || nextItem) ? `
    <div class="sibling-nav">

        <button class="sibling-nav-label" onclick="${backOnclick}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>

        </button>

      </div>
      ${nextItem ? `<button class="sibling-nav-btn next" title="${escAttr(labelFromName(nextItem.name))}" onclick="loadChapter('${escAttr(nextItem.path)}')">${escHtml(labelFromName(nextItem.name))}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>` : '<div class="sibling-nav-placeholder"><span>—</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>'}
    </div>` : '';

  const siblingNavBottom = (prevItem || nextItem) ? `
    <div class="sibling-nav sibling-nav-bottom">
      ${prevItem ? `<button class="sibling-nav-btn prev" title="${escAttr(labelFromName(prevItem.name))}" onclick="loadChapter('${escAttr(prevItem.path)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>${escHtml(labelFromName(prevItem.name))}</button>` : '<div class="sibling-nav-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg><span>—</span></div>'}
      <div class="sibling-nav-center">
        <button class="sibling-nav-label" onclick="${backOnclick}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          chapters
        </button>
        <span class="sibling-nav-counter">${currentIdx + 1} / ${groupItems.length}</span>
      </div>
      ${nextItem ? `<button class="sibling-nav-btn next" title="${escAttr(labelFromName(nextItem.name))}" onclick="loadChapter('${escAttr(nextItem.path)}')">${escHtml(labelFromName(nextItem.name))}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>` : '<div class="sibling-nav-placeholder"><span>—</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>'}
    </div>` : '';

  const html = converter.makeHtml(text);

  area.innerHTML = `
    <div class="chapter-viewer">
      <div class="reading-progress" id="reading-progress" aria-hidden="true"></div>
      <button class="nav-back-link" onclick="${backOnclick}">← ${escHtml(backLabel)}</button>
      ${siblingNavTop}

      <div class="reader-tools">
        <div class="reader-tools-left">
          <div style="position:relative;flex:1;max-width:200px">
            <input type="text" id="chapter-search-input"
              placeholder="Find in chapter…"
              aria-label="Search in chapter"
              style="width:100%;padding:4px 8px;border:1px solid var(--surface-variant);border-radius:4px;background:var(--surface-container-low);color:var(--ink);font-size:12px;font-family:var(--font-sans);outline:none"
              onkeydown="if(event.key==='Escape'){this.value='';clearSearch()}" />
          </div>
        </div>
        <div class="reader-tools-right">
          <button class="tool-btn" onclick="adjustFontSize(-1)" title="Decrease font size">A−</button>
          <button class="tool-btn" onclick="adjustFontSize(1)" title="Increase font size">A+</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" onclick="adjustContentWidth(-50)" title="Narrower">W−</button>
          <button class="tool-btn" onclick="adjustContentWidth(50)" title="Wider">W+</button>
          <div class="tool-sep"></div>
          <button class="tool-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <div class="tool-sep"></div>
          <button class="tool-btn" onclick="copyChapterLink()" title="Copy link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Link
          </button>
          <button class="tool-btn" onclick="exportPDF()" title="Export as PDF" id="pdf-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12"/><line x1="15" y1="15" x2="12" y2="12"/></svg>
            PDF
          </button>
          <div class="tool-sep"></div>
          <button class="tool-btn ${_bmActive ? 'bookmarked' : ''}" id="bookmark-btn" onclick="toggleBookmark()" title="Bookmark this chapter">
            <svg viewBox="0 0 24 24" fill="${_bmActive ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          ${TAURI ? `<button class="tool-btn" onclick="enterEditMode()" title="Edit markdown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
            Edit
          </button>` : ''}
        </div>
      </div>

      <div class="chapter-info">
        <span class="chapter-info-path">${escHtml(path)}</span>
        <span class="chapter-info-words">${wordCount.toLocaleString()} words</span>
      </div>

      <div class="chapter-markdown" id="chapter-md" data-title="${escHtml(mdTitle)}">${html}</div>
      ${siblingNavBottom}
    </div>`;

  // Search
  document.getElementById('chapter-search-input').addEventListener('input', onChapterSearch);

  // Syntax highlight
  if (typeof hljs !== 'undefined') {
    area.querySelectorAll('pre code').forEach(el => {
      if (el.classList.contains('language-mermaid')) return;
      hljs.highlightElement(el);
    });
  }

  // SVG blocks
  area.querySelectorAll('pre code.language-svg').forEach(block => {
    const pre = block.parentElement;
    pre.innerHTML = block.textContent.trim();
    pre.classList.add('svg-block');
  });

  // Copy buttons
  area.querySelectorAll('pre').forEach(pre => {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    };
    wrapper.appendChild(btn);
  });

  // Mermaid
  area.querySelectorAll('pre code.language-mermaid').forEach(block => {
    const pre = block.parentElement;
    pre.classList.add('mermaid');
    pre.textContent = block.textContent;
  });

  if (area.querySelector('.mermaid')) {
    mermaid.run({ nodes: area.querySelectorAll('.mermaid') }).catch(err => {
      console.warn('[Mermaid]', err.message || String(err));
    });
  }

  setupScrollProgress();
}

// ── READING PROGRESS ─────────────────────────────────────────────────────────
function setupScrollProgress() {
  const el = document.getElementById('reading-progress');
  if (!el) return;
  const update = () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const frac = docHeight > 0 ? scrollTop / docHeight : 0;
    el.style.width = (frac * 100) + '%';
    // Persist reading position for the current chapter (debounced inside saveProgress).
    if (!editing && currentPath) {
      const item = folderMeta.find(f => f.path === currentPath);
      if (item) {
        const pr = progressFor(item.diskPath || item.path);
        saveProgress(item.diskPath || item.path, frac, pr.bookmarked);
      }
    }
  };
  window.addEventListener('scroll', update, { passive: true });
  update();
}

// ── IN-CHAPTER SEARCH ───────────────────────────────────────────────────────
let searchMatches = [];
let searchIdx = 0;

function onChapterSearch(e) {
  const query = e.target.value.trim();
  const md = document.getElementById('chapter-md');
  if (!md) return;

  md.querySelectorAll('.search-highlight').forEach(el => {
    const parent = el.parentNode;
    while (el.firstChild) parent.insertBefore(el.firstChild, el);
    parent.removeChild(el);
  });

  if (!query) { searchMatches = []; searchIdx = 0; return; }

  const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  const walker = document.createTreeWalker(md, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(node => {
    if (node.parentElement.closest('.search-highlight')) return;
    if (['SCRIPT','STYLE','TEXTAREA','INPUT'].includes(node.parentElement.tagName)) return;
    const text = node.textContent;
    if (regex.test(text)) {
      const span = document.createElement('span');
      span.innerHTML = text.replace(regex, '<mark class="search-highlight">$1</mark>');
      node.parentNode.replaceChild(span, node);
    }
  });

  searchMatches = Array.from(md.querySelectorAll('.search-highlight'));
  searchIdx = 0;
  if (searchMatches.length) {
    searchMatches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function clearSearch() {
  const input = document.getElementById('chapter-search-input');
  if (input) input.value = '';
  onChapterSearch({ target: { value: '' } });
}

// ── READER TOOLS ────────────────────────────────────────────────────────────
function adjustFontSize(delta) {
  const sizes = ['sm', '', 'lg', 'xl'];
  const html = document.documentElement;
  const current = html.getAttribute('data-font-size') || '';
  const idx = sizes.indexOf(current);
  const nextIdx = Math.max(0, Math.min(sizes.length - 1, idx + delta));
  html.setAttribute('data-font-size', sizes[nextIdx] || '');
  localStorage.setItem('fenceymd-fontsize', sizes[nextIdx] || '');
}

function adjustContentWidth(delta) {
  const current = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--content-w')) || 680;
  const newW = Math.max(400, Math.min(1200, current + delta));

  document.documentElement.style.setProperty('--content-w', newW + 'px');
  const base = newW / 680;
  document.documentElement.style.setProperty('--home-w', Math.round(980 * base) + 'px');
  document.documentElement.style.setProperty('--landing-w', Math.round(820 * base) + 'px');

  const wrapper = document.getElementById('content-area-wrapper');
  const contentA = document.getElementById('content-area');
  if (wrapper) {
    wrapper.style.width = newW + 'px';
  }
  if (contentA) contentA.style.width = newW + 'px';
  localStorage.setItem('fenceymd-content-width', newW);
}

function copyChapterLink() {
  if (!currentPath) return;
  const url = location.origin + location.pathname + '?load=' + encodeURIComponent(currentPath);
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('[onclick="copyChapterLink()"]');
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => { btn.innerHTML = orig; }, 1500);
    }
  });
}

async function exportPDF() {
  const btn = document.getElementById('pdf-btn');
  const origHTML = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Exporting…`;
  btn.disabled = true;

  const content = document.getElementById('chapter-md');
  const title = content?.dataset?.title || 'MD-Reader-Export';
  const filename = title.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.pdf';

  const clone = content.cloneNode(true);

  const exportStyle = document.createElement('style');
  exportStyle.textContent = `
    pre.mermaid { page-break-inside: avoid !important; overflow: visible !important; break-inside: avoid; }
    pre.mermaid svg { max-width: 100% !important; height: auto !important; }
  `;
  clone.insertBefore(exportStyle, clone.firstChild);

  clone.querySelectorAll('pre.mermaid svg').forEach(svg => {
    try {
      const pre = svg.parentElement;
      pre.style.pageBreakInside = 'avoid';
      pre.style.overflow = 'visible';
      svg.style.maxWidth = '100%';
      svg.style.height = 'auto';
      svg.style.display = 'block';
      svg.style.margin = '0 auto';
    } catch (e) {
      console.warn('[PDF Export] SVG resize failed:', e);
    }
  });

  await new Promise(r => setTimeout(r, 500));

  const opt = {
    margin: [0.5, 0.5, 0.5, 0.5],
    filename: filename,
    image: { type: 'jpeg', quality: 0.92 },
    html2canvas: { scale: 1.5, useCORS: true, logging: false, backgroundColor: '#ffffff', allowTaint: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: 'css' },
    enableLinks: false
  };

  html2pdf().set(opt).from(clone).save().then(() => {
    btn.innerHTML = origHTML;
    btn.disabled = false;
  }).catch(err => {
    console.error('PDF export failed:', err);
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Error`;
    setTimeout(() => { btn.innerHTML = origHTML; }, 2000);
  });
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('fenceymd-theme', isDark ? 'light' : 'dark');
  const btn = document.getElementById('theme-btn');
  if (btn) {
    btn.innerHTML = isDark
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  }
}

// ── THEME INIT ───────────────────────────────────────────────────────────────
function initTheme() {
  const savedTheme = localStorage.getItem('fenceymd-theme');
  const savedFont   = localStorage.getItem('fenceymd-fontsize');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  if (savedFont)   document.documentElement.setAttribute('data-font-size', savedFont);
}
